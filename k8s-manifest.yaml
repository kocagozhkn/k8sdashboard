---
apiVersion: v1
kind: Namespace
metadata:
  name: topology
  labels:
    app.kubernetes.io/name: k8s-topology

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-topology
  namespace: topology

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-topology-reader
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-topology-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-topology-reader
subjects:
  - kind: ServiceAccount
    name: k8s-topology
    namespace: topology

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-topology
  namespace: topology
  labels:
    app: k8s-topology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-topology
  template:
    metadata:
      labels:
        app: k8s-topology
    spec:
      serviceAccountName: k8s-topology
      containers:
        - name: k8s-topology
          image: cortexdevacrincp2.azurecr.io/k8s-topology:latest
          imagePullPolicy: Always
          env:
            # Prometheus Service DNS (port dahil). AKS azure-extensions-usage-system: svc adını kubectl get svc -n … ile doğrulayın
            - name: PROMETHEUS_UPSTREAM
              value: "prometheus.azure-extensions-usage-system.svc.cluster.local:9090"
            # SQLite kullanıcılar (/app/data/auth.db). SESSION_SECRET zorunlu; ALLOW_SIGNUP=0 ile yalnızca mevcut kullanıcılar.
            # - name: SESSION_SECRET
            #   valueFrom: { secretKeyRef: { name: k8s-topology-auth, key: session } }
            # - name: ALLOW_SIGNUP
            #   value: "0"
          volumeMounts:
            - name: auth-db
              mountPath: /app/data
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: kubectl-proxy
          image: rancher/kubectl:v1.33.3
          args:
            - proxy
            - --address=127.0.0.1
            - --port=8001
            - --accept-hosts=^.*$
            - --accept-paths=^.*$
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: auth-db
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-topology
  namespace: topology
  labels:
    app: k8s-topology
  annotations:
    # Kong kullanılmaz; Azure iç LoadBalancer (VNet IP)
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: k8s-topology
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
