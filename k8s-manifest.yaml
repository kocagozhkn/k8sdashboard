---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-topology
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-topology-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-topology-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-topology-reader
subjects:
  - kind: ServiceAccount
    name: k8s-topology
    namespace: default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-topology
  namespace: default
  labels:
    app: k8s-topology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-topology
  template:
    metadata:
      labels:
        app: k8s-topology
    spec:
      serviceAccountName: k8s-topology
      containers:
        - name: k8s-topology
          image: your-registry/k8s-topology:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-topology
  namespace: default
spec:
  selector:
    app: k8s-topology
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
