services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcm
      POSTGRES_PASSWORD: mcm
      POSTGRES_DB: mcm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcm -d mcm"]
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  cluster-service:
    build:
      context: ./services/cluster-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://mcm:mcm@postgres:5432/mcm?sslmode=disable
      HTTP_ADDR: ":8081"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  agent-hub-service:
    build:
      context: ./services/agent-hub-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8086"
    ports:
      - "8086:8086"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      CLUSTER_SERVICE_URL: http://cluster-service:8081
      AGENT_HUB_SERVICE_URL: http://agent-hub-service:8086
      LISTEN_ADDR: ":8080"
    depends_on:
      - cluster-service
      - agent-hub-service
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8082:8080"

  gitops-service:
    build:
      context: ./services/gitops-service
      dockerfile: Dockerfile
    ports:
      - "8083:8080"

  policy-service:
    build:
      context: ./services/policy-service
      dockerfile: Dockerfile
    ports:
      - "8084:8080"

  observability-service:
    build:
      context: ./services/observability-service
      dockerfile: Dockerfile
    ports:
      - "8085:8080"
