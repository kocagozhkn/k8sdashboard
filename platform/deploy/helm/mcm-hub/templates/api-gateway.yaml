apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcm-hub.fullname" . }}-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - port: 8080
      targetPort: http
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcm-hub.fullname" . }}-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
      containers:
        - name: gateway
          image: {{ .Values.gateway.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: CLUSTER_SERVICE_URL
              value: http://{{ include "mcm-hub.fullname" . }}-cluster-service:8081
            - name: AGENT_HUB_SERVICE_URL
              value: http://{{ include "mcm-hub.fullname" . }}-agent-hub-service:8086
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
