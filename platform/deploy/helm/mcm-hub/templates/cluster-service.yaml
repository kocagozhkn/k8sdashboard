apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcm-hub.fullname" . }}-cluster-service
  labels:
    app.kubernetes.io/name: cluster-service
spec:
  selector:
    app.kubernetes.io/name: cluster-service
  ports:
    - port: 8081
      targetPort: http
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcm-hub.fullname" . }}-cluster-service
  labels:
    app.kubernetes.io/name: cluster-service
spec:
  replicas: {{ .Values.clusterService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cluster-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cluster-service
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
      containers:
        - name: cluster-service
          image: {{ .Values.clusterService.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: HTTP_ADDR
              value: ":8081"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.secretKey }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.clusterService.resources | nindent 12 }}
