apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcm-hub.fullname" . }}-agent-hub-service
  labels:
    app.kubernetes.io/name: agent-hub-service
spec:
  selector:
    app.kubernetes.io/name: agent-hub-service
  ports:
    - port: 8086
      targetPort: http
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcm-hub.fullname" . }}-agent-hub-service
  labels:
    app.kubernetes.io/name: agent-hub-service
spec:
  replicas: {{ .Values.agentHubService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-hub-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-hub-service
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
      containers:
        - name: agent-hub-service
          image: {{ .Values.agentHubService.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: HTTP_ADDR
              value: ":8086"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.agentHubService.resources | nindent 12 }}
