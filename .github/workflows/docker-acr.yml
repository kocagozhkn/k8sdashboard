name: Docker build and push (ACR)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cortexdevacrincp2.azurecr.io
  IMAGE_NAME: k8s-topology

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Azure Container Registry
        if: ${{ secrets.ACR_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ secrets.ACR_PASSWORD != '' }}
          build-args: BUILD_SHA=${{ steps.meta.outputs.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
